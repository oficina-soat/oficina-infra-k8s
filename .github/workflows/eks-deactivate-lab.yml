name: Deactivate EKS Lab

on:
  workflow_dispatch:
    inputs:
      confirm_deactivate:
        description: "Digite DEACTIVATE para confirmar a desativacao somente do EKS"
        required: true
        type: string

concurrency:
  group: lab-infra
  cancel-in-progress: false

jobs:
  deactivate:
    if: inputs.confirm_deactivate == 'DEACTIVATE'
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TERRAFORM_REQUIRE_REMOTE_STATE: "true"
      TERRAFORM_ACTION: destroy
      TERRAFORM_DESTROY_TARGETS: "module.eks"
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_cluster_name: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_VAR_terraform_shared_data_bucket_name: ${{ vars.TERRAFORM_SHARED_DATA_BUCKET_NAME || vars.TF_STATE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            EKS_CLUSTER_NAME
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub (organization, repository ou environment): ${name}" >&2
              exit 1
            fi
          done

          aws sts get-caller-identity >/dev/null

      - name: Deactivate EKS only
        shell: bash
        run: bash ./scripts/ci-terraform.sh
