name: Destroy Lab

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Digite DESTROY para confirmar a remoção completa da infraestrutura do lab"
        required: true
        type: string
      delete_runtime_secrets:
        description: "Também remove os secrets runtime compartilhados da suite no Secrets Manager"
        required: true
        default: true
        type: boolean
      skip_final_db_snapshot:
        description: "Pula o snapshot final do RDS para zerar custo de armazenamento"
        required: true
        default: true
        type: boolean
      delete_lambda_artifact_objects:
        description: "Também remove os objetos de artefato das Lambdas no bucket S3 configurado"
        required: true
        default: false
        type: boolean
      delete_shared_state_bucket:
        description: "Também remove o bucket S3 compartilhado de state ao final do destroy, incluindo todos os versions e states remotos da suite"
        required: true
        default: false
        type: boolean

concurrency:
  group: lab-infra
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  destroy:
    if: inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TERRAFORM_ACTION: destroy
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_IDENTIFIER: ${{ vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_PORT: ${{ vars.DB_PORT || '5432' }}
      DB_APP_SECRET_NAME: ${{ vars.K8S_DATABASE_SECRET_ID || 'oficina/lab/database/app' }}
      AUTH_DB_SECRET_NAME: ${{ vars.AUTH_DB_SECRET_NAME || 'oficina/lab/database/auth-lambda' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      AUTH_LAMBDA_LEGACY_LOG_GROUP_NAME: ${{ vars.AUTH_LAMBDA_LEGACY_LOG_GROUP_NAME || '/aws/lambda/OficinaAuthLambdaNative' }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET || vars.TF_STATE_BUCKET }}
      DELETE_RUNTIME_SECRETS: ${{ inputs.delete_runtime_secrets }}
      DELETE_LAMBDA_ARTIFACT_OBJECTS: ${{ inputs.delete_lambda_artifact_objects }}
      DELETE_SHARED_STATE_BUCKET: ${{ inputs.delete_shared_state_bucket }}
      FAIL_ON_DEFERRED_SECURITY_GROUPS: ${{ vars.FAIL_ON_DEFERRED_SECURITY_GROUPS || 'false' }}
      SKIP_FINAL_DB_SNAPSHOT: ${{ inputs.skip_final_db_snapshot }}
      NETWORK_INTERFACE_WAIT_SECONDS: ${{ vars.NETWORK_INTERFACE_WAIT_SECONDS || '900' }}
      FINAL_NETWORK_INTERFACE_WAIT_SECONDS: ${{ vars.FINAL_NETWORK_INTERFACE_WAIT_SECONDS || '1800' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      TF_VAR_eks_cluster_role_arn: ${{ vars.EKS_CLUSTER_ROLE_ARN }}
      TF_VAR_eks_node_role_arn: ${{ vars.EKS_NODE_ROLE_ARN }}
      TF_VAR_eks_access_principal_arn: ${{ vars.EKS_ACCESS_PRINCIPAL_ARN }}
      TF_VAR_ecr_force_delete: "true"
      TF_VAR_api_gateway_name: ${{ vars.API_GATEWAY_NAME }}
      TF_VAR_api_gateway_vpc_link_subnet_ids: ${{ vars.API_GATEWAY_VPC_LINK_SUBNET_IDS }}
      TF_VAR_api_gateway_vpc_link_security_group_ids: ${{ vars.API_GATEWAY_VPC_LINK_SECURITY_GROUP_IDS }}
      TF_VAR_expose_mailhog_smtp_private_nlb: ${{ vars.EXPOSE_MAILHOG_SMTP_PRIVATE_NLB || 'true' }}
      TF_VAR_notificacao_lambda_security_group_name: ${{ vars.NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME }}
      TF_VAR_terraform_shared_data_bucket_name: ${{ vars.TERRAFORM_SHARED_DATA_BUCKET_NAME || vars.TF_STATE_BUCKET }}
      TF_VAR_terraform_shared_data_bucket_force_destroy: "true"
      TF_VAR_observability_enabled: ${{ vars.OBSERVABILITY_ENABLED || 'true' }}
      TF_VAR_observability_enable_k8s_resource_metrics: ${{ vars.OBSERVABILITY_ENABLE_K8S_RESOURCE_METRICS || 'true' }}
      TF_VAR_observability_alert_email_endpoints: ${{ vars.OBSERVABILITY_ALERT_EMAIL_ENDPOINTS || '[]' }}
      K8S_JWT_SECRET_ID: ${{ vars.K8S_JWT_SECRET_ID || 'oficina/lab/jwt' }}
      JWT_SECRET_NAME: ${{ vars.K8S_JWT_SECRET_ID || 'oficina/lab/jwt' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            EKS_CLUSTER_NAME
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuração obrigatória ausente em vars/secrets do GitHub (organization, repository ou environment): ${name}" >&2
              exit 1
            fi
          done

          aws sts get-caller-identity >/dev/null

      - name: Cleanup suite AWS resources outside this Terraform state
        shell: bash
        run: bash ./scripts/actions/cleanup-suite-aws.sh

      - name: Destroy lab infrastructure
        id: destroy_lab
        continue-on-error: true
        shell: bash
        run: bash ./scripts/actions/ci-terraform.sh

      - name: Retry cleanup after failed destroy
        if: steps.destroy_lab.outcome == 'failure'
        shell: bash
        run: bash ./scripts/actions/cleanup-suite-aws.sh

      - name: Retry destroy lab infrastructure
        if: steps.destroy_lab.outcome == 'failure'
        shell: bash
        run: bash ./scripts/actions/ci-terraform.sh
