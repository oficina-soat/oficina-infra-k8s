apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-app
  labels:
    app.kubernetes.io/name: oficina-app
    app.kubernetes.io/part-of: oficina
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: oficina-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-app
        app.kubernetes.io/part-of: oficina
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: oficina-app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: oficina-database-env
                optional: true
            - configMapRef:
                name: oficina-app-config
          volumeMounts:
            - name: jwt-keys
              mountPath: /jwt
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: jwt-keys
          secret:
            secretName: oficina-jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: oficina-app
  labels:
    app.kubernetes.io/name: oficina-app
    app.kubernetes.io/part-of: oficina
spec:
  selector:
    app.kubernetes.io/name: oficina-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
