apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  # Credenciais apenas para laboratorio/demonstracao.
  # Em ambiente real, use um secret manager e rotacione credenciais.
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: oficina
data:
  JAVA_OPTS_APPEND: "-Xms256m -Xmx512m"
